name: luz_para_hoy
description: >
  Aplicacion catolica offline-first: Biblia en orden, Rosario guiado,
  oraciones, reflexiones y vida espiritual diaria.
publish_to: "none"
version: 0.6.0+6

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1

  # Navegacion
  go_router: ^14.2.0

  # Almacenamiento local (sin Firebase, sin backend)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Utilidades
  intl: ^0.19.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.0

  # Audio (musica de fondo del Rosario, reproduccion offline)
  audioplayers: ^6.1.0

  # Notificaciones locales (sin servicios externos)
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#412A66"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/data/bible/
    - assets/data/bible/books/
    - assets/data/prayers/
    - assets/data/quotes/
    - assets/data/reflections/
    - assets/data/rosary/
    - assets/data/saints/
    - assets/data/music/
